version: '3.8'

services:
  backend:
    image: quanganhngo2107/agent_project-backend:latest 
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agent_backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    environment:
      # - QDRANT_URL=http://qdrant:6333
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload
    # Đảm bảo Qdrant chạy trước khi Backend khởi động
